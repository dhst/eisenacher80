<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard: Finanzierung & Lebensplanung Leipzig</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --buy-color: #10b981;
            --rent-color: #ef4444;
            --debt-color: #94a3b8;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        /* Sidebar Controls */
        .controls-panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .control-section { margin-bottom: 25px; }
        .control-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .control-group { margin-bottom: 15px; }
        
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .control-header label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .control-header input[type="number"] {
            width: 85px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--primary);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Charts Area */
        .charts-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .chart-card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            flex: 1;
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .chart-card h2 {
            font-size: 1.1rem;
            margin: 0 0 15px 0;
            color: var(--text-main);
        }

        .canvas-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
            body { height: auto; display: block; }
            .charts-panel { overflow: visible; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Projekt Leipzig: Finanzierungs- & Lebenssimulator</h1>
    </header>

    <div class="dashboard">
        <!-- Controls Sidebar -->
        <div class="controls-panel">
            <div class="control-section">
                <h3>Immobilie & Kredit</h3>
                
                <div class="control-group">
                    <div class="control-header"><label>Darlehenssumme (€)</label><input type="number" id="kreditNum" value="252250" step="1000" oninput="sync('kredit', this.value)"></div>
                    <input type="range" id="kreditSlide" min="0" max="600000" step="1000" value="252250" oninput="sync('kredit', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Zinssatz p.a. (%)</label><input type="number" id="zinsNum" value="3.5" step="0.1" oninput="sync('zins', this.value)"></div>
                    <input type="range" id="zinsSlide" min="0.5" max="8" step="0.1" value="3.5" oninput="sync('zins', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Tilgung p.a. (%)</label><input type="number" id="tilgungNum" value="4.0" step="0.1" oninput="sync('tilgung', this.value)"></div>
                    <input type="range" id="tilgungSlide" min="1" max="10" step="0.1" value="4.0" oninput="sync('tilgung', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Sondertilgung p.a. (€)</label><input type="number" id="sondertilgungNum" value="2500" step="500" oninput="sync('sondertilgung', this.value)"></div>
                    <input type="range" id="sondertilgungSlide" min="0" max="15000" step="500" value="2500" oninput="sync('sondertilgung', this.value)">
                </div>
                
                <div class="control-group">
                    <div class="control-header"><label>Wertsteigerung p.a. (%)</label><input type="number" id="immoZuwachsNum" value="1.5" step="0.1" oninput="sync('immoZuwachs', this.value)"></div>
                    <input type="range" id="immoZuwachsSlide" min="-2" max="5" step="0.1" value="1.5" oninput="sync('immoZuwachs', this.value)">
                </div>
            </div>

            <div class="control-section">
                <h3>Lebensplanung & Markt</h3>
                
                <div class="control-group">
                    <div class="control-header"><label>Sparplan mtl. (€)</label><input type="number" id="sparplanNum" value="2000" step="100" oninput="sync('sparplan', this.value)"></div>
                    <input type="range" id="sparplanSlide" min="0" max="5000" step="100" value="2000" oninput="sync('sparplan', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>ETF Rendite p.a. (%)</label><input type="number" id="etfRenditeNum" value="5.0" step="0.1" oninput="sync('etfRendite', this.value)"></div>
                    <input type="range" id="etfRenditeSlide" min="0" max="10" step="0.1" value="5.0" oninput="sync('etfRendite', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Inflation p.a. (%)</label><input type="number" id="inflationNum" value="2.0" step="0.1" oninput="sync('inflation', this.value)"></div>
                    <input type="range" id="inflationSlide" min="0" max="6" step="0.1" value="2.0" oninput="sync('inflation', this.value)">
                </div>
                
                <div class="control-group">
                    <div class="control-header"><label>Kaltmiete aktuell (€)</label><input type="number" id="mieteNum" value="1200" step="50" oninput="sync('miete', this.value)"></div>
                    <input type="range" id="mieteSlide" min="500" max="3000" step="50" value="1200" oninput="sync('miete', this.value)">
                </div>
            </div>

            <div class="control-section">
                <h3>Rente & Entnahmen</h3>
                
                <div class="control-group">
                    <div class="control-header"><label>BAföG-Ersatz mtl. (€)</label><input type="number" id="bafoegNum" value="800" step="50" oninput="sync('bafoeg', this.value)"></div>
                    <input type="range" id="bafoegSlide" min="0" max="2000" step="50" value="800" oninput="sync('bafoeg', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Rentenlücke mtl. (€)</label><input type="number" id="rentenLueckeNum" value="1000" step="100" oninput="sync('rentenLuecke', this.value)"></div>
                    <input type="range" id="rentenLueckeSlide" min="0" max="4000" step="100" value="1000" oninput="sync('rentenLuecke', this.value)">
                </div>

                <div class="control-group">
                    <div class="control-header"><label>Zusatz Pflege/Luxus (€)</label><input type="number" id="zusatzNum" value="0" step="100" oninput="sync('zusatz', this.value)"></div>
                    <input type="range" id="zusatzSlide" min="0" max="5000" step="100" value="0" oninput="sync('zusatz', this.value)">
                </div>
            </div>
        </div>

        <!-- Charts Area -->
        <div class="charts-panel">
            <div class="chart-card">
                <h2>Gesamtvermögen & Restschuld (Alter 40 bis 85)</h2>
                <div class="canvas-wrapper"><canvas id="wealthChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h2>Zahlungsströme: Monatliche Wohnkosten & Liquiditätsbedarf</h2>
                <div class="canvas-wrapper"><canvas id="cashflowChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let wealthChartInstance = null;
        let cashflowChartInstance = null;

        // Feste Konstanten aus Szenario 2
        const IMMO_STARTWERT = 620000; 
        const HAUSGELD_START = 350;
        const ETF_START_KAUFEN = 247750;
        const ETF_START_MIETEN = 400000;
        const JAHRE_BIS_BAFOEG = 15;
        const JAHRE_BIS_RENTE = 25;

        // Synchronisiert Zahleneingabe und Slider
        function sync(id, value) {
            document.getElementById(id + 'Num').value = value;
            document.getElementById(id + 'Slide').value = value;
            calculateAndDraw();
        }

        // Haupt-Logik
        function calculateAndDraw() {
            // Werte aus UI lesen
            const kreditStart = parseFloat(document.getElementById('kreditNum').value);
            const zins = parseFloat(document.getElementById('zinsNum').value) / 100;
            const tilgung = parseFloat(document.getElementById('tilgungNum').value) / 100;
            const sondertilgung = parseFloat(document.getElementById('sondertilgungNum').value);
            const immoZuwachs = parseFloat(document.getElementById('immoZuwachsNum').value) / 100;
            const sparplan = parseFloat(document.getElementById('sparplanNum').value);
            const etfRendite = parseFloat(document.getElementById('etfRenditeNum').value) / 100;
            const inflation = parseFloat(document.getElementById('inflationNum').value) / 100;
            const mieteHeute = parseFloat(document.getElementById('mieteNum').value);
            const bafoegBetrag = parseFloat(document.getElementById('bafoegNum').value);
            const rentenLuecke = parseFloat(document.getElementById('rentenLueckeNum').value);
            const zusatzEntnahme = parseFloat(document.getElementById('zusatzNum').value);

            // Annuität Bank
            const annuitaetP_a = kreditStart * (zins + tilgung);

            // Daten-Arrays für Charts
            let labels = [];
            let dataWealthMieten = [];
            let dataWealthKaufen = [];
            let dataRestschuld = [];
            
            let dataKostenMieten = [];
            let dataKostenKaufen = [];

            // Status-Variablen
            let restschuld = kreditStart;
            let immoWert = IMMO_STARTWERT;
            let etfMieten = ETF_START_MIETEN;
            let etfKaufen = ETF_START_KAUFEN;

            for (let year = 0; year <= 45; year++) {
                labels.push(40 + year);

                let inflationsFaktor = Math.pow(1 + inflation, year);
                let mieteJahr = mieteHeute * inflationsFaktor * 12;
                let hausgeldJahr = HAUSGELD_START * inflationsFaktor * 12;
                
                // Entnahmen
                let entnahmeSohn = (year >= JAHRE_BIS_BAFOEG && year < JAHRE_BIS_BAFOEG + 5) ? (bafoegBetrag * inflationsFaktor * 12) : 0;
                let entnahmeRente = (year >= JAHRE_BIS_RENTE) ? ((rentenLuecke + zusatzEntnahme) * inflationsFaktor * 12) : 0;
                let aktiverSparplan = (year < JAHRE_BIS_RENTE) ? (sparplan * 12) : 0;

                let kreditCashflow = 0;

                if (year > 0) {
                    // 1. Kredit abwickeln
                    let zinsKosten = restschuld * zins;
                    let tilgungsLeistung = annuitaetP_a - zinsKosten;
                    
                    if (restschuld > 0) {
                        let gesamtTilgung = tilgungsLeistung + sondertilgung;
                        if (gesamtTilgung > restschuld) {
                            gesamtTilgung = restschuld;
                            tilgungsLeistung = restschuld; // Letztes Jahr exakte Anpassung
                        }
                        restschuld -= gesamtTilgung;
                        kreditCashflow = zinsKosten + gesamtTilgung;
                    } else {
                        restschuld = 0;
                    }

                    // 2. Werte updaten
                    immoWert = immoWert * (1 + immoZuwachs);

                    // ETF Mieten
                    etfMieten = etfMieten * (1 + etfRendite);
                    etfMieten += aktiverSparplan - mieteJahr - entnahmeSohn - entnahmeRente;
                    if(etfMieten < 0) etfMieten = 0;

                    // ETF Kaufen
                    etfKaufen = etfKaufen * (1 + etfRendite);
                    let verfuegbaresBudget = mieteJahr + aktiverSparplan; 
                    etfKaufen += verfuegbaresBudget - kreditCashflow - hausgeldJahr - entnahmeSohn - entnahmeRente;
                    if(etfKaufen < 0) etfKaufen = 0;
                } else {
                    kreditCashflow = (restschuld > 0) ? annuitaetP_a + sondertilgung : 0;
                }

                // Push für Chart 1 (Vermögen)
                dataWealthMieten.push(Math.round(etfMieten));
                dataWealthKaufen.push(Math.round(etfKaufen + immoWert - restschuld));
                dataRestschuld.push(Math.round(restschuld));

                // Push für Chart 2 (Wohnkosten pro Monat)
                dataKostenMieten.push(Math.round(mieteJahr / 12));
                dataKostenKaufen.push(Math.round((hausgeldJahr + kreditCashflow) / 12));
            }

            drawWealthChart(labels, dataWealthMieten, dataWealthKaufen, dataRestschuld);
            drawCashflowChart(labels, dataKostenMieten, dataKostenKaufen);
        }

        // Währungs-Formatter
        const currFormatter = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

        function drawWealthChart(labels, dataMieten, dataKaufen, dataRestschuld) {
            const ctx = document.getElementById('wealthChart').getContext('2d');
            if (wealthChartInstance) wealthChartInstance.destroy();

            wealthChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Gesamtvermögen Kaufen',
                            data: dataKaufen,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Gesamtvermögen Mieten',
                            data: dataMieten,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.05)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Restschuld Kredit',
                            data: dataRestschuld,
                            borderColor: '#94a3b8',
                            backgroundColor: 'rgba(148, 163, 184, 0.2)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: true,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { ticks: { callback: val => currFormatter.format(val) } },
                        x: { title: { display: true, text: 'Lebensalter (Jahre)' } }
                    },
                    plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + currFormatter.format(ctx.parsed.y) } } }
                }
            });
        }

        function drawCashflowChart(labels, dataMieten, dataKaufen) {
            const ctx = document.getElementById('cashflowChart').getContext('2d');
            if (cashflowChartInstance) cashflowChartInstance.destroy();

            cashflowChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Wohnkosten Mieten (Kaltmiete, mtl.)',
                            data: dataMieten,
                            borderColor: '#ef4444',
                            borderWidth: 2,
                            tension: 0.3
                        },
                        {
                            label: 'Wohnkosten Kaufen (Kredit + Hausgeld, mtl.)',
                            data: dataKaufen,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            stepped: true // Zeigt den Drop beim Kreditende besser
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { ticks: { callback: val => currFormatter.format(val) } },
                        x: { title: { display: true, text: 'Lebensalter (Jahre)' } }
                    },
                    plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + currFormatter.format(ctx.parsed.y) } } }
                }
            });
        }

        window.onload = calculateAndDraw;
    </script>
</body>
</html>
